<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Админ-панель — АСДРД</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Source+Sans+3:wght@300;400;600&display=swap" rel="stylesheet" />
  <style>
    /* ── Переменные ── */
    :root {
      --bg:        #0f1623;
      --bg-card:   #1a2235;
      --bg-input:  #111827;
      --border:    rgba(255,255,255,0.08);
      --accent:    #3b82f6;
      --accent-dk: #2563eb;
      --green:     #22c55e;
      --red:       #ef4444;
      --amber:     #f59e0b;
      --text:      #f1f5f9;
      --muted:     #64748b;
      --font-d:    'Playfair Display', Georgia, serif;
      --font-b:    'Source Sans 3', sans-serif;
      --radius:    10px;
      --tr:        0.2s ease;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: var(--font-b);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.6;
    }

    /* ── LOGIN SCREEN ── */
    .login-screen {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: radial-gradient(ellipse 80% 60% at 50% 0%, rgba(59,130,246,0.12) 0%, transparent 70%);
    }

    .login-box {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 48px 44px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 24px 60px rgba(0,0,0,0.4);
    }

    .login-logo {
      font-family: var(--font-d);
      font-size: 22px;
      color: var(--accent);
      text-align: center;
      margin-bottom: 8px;
    }

    .login-title {
      font-family: var(--font-d);
      font-size: 26px;
      text-align: center;
      margin-bottom: 6px;
    }

    .login-sub {
      text-align: center;
      color: var(--muted);
      font-size: 14px;
      margin-bottom: 36px;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 7px;
      margin-bottom: 18px;
    }

    .form-group label {
      font-size: 13px;
      font-weight: 600;
      color: var(--muted);
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    .form-group input {
      font-family: var(--font-b);
      font-size: 15px;
      padding: 12px 16px;
      background: var(--bg-input);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      outline: none;
      transition: border-color var(--tr), box-shadow var(--tr);
    }

    .form-group input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(59,130,246,0.15);
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 12px 24px;
      border-radius: var(--radius);
      font-family: var(--font-b);
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: all var(--tr);
    }

    .btn-primary {
      background: var(--accent);
      color: #fff;
      width: 100%;
      padding: 14px;
      margin-top: 8px;
    }

    .btn-primary:hover { background: var(--accent-dk); transform: translateY(-1px); }
    .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

    .login-error {
      background: rgba(239,68,68,0.12);
      border: 1px solid rgba(239,68,68,0.3);
      color: #fca5a5;
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 14px;
      margin-top: 14px;
      display: none;
      text-align: center;
    }

    /* ── ADMIN PANEL ── */
    .admin-panel { display: none; min-height: 100vh; }

    /* Header */
    .admin-header {
      background: var(--bg-card);
      border-bottom: 1px solid var(--border);
      padding: 0 32px;
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .admin-header__left {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .admin-logo {
      font-family: var(--font-d);
      font-size: 18px;
      color: var(--accent);
    }

    .admin-badge {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      background: rgba(59,130,246,0.15);
      color: var(--accent);
      padding: 3px 10px;
      border-radius: 100px;
      border: 1px solid rgba(59,130,246,0.25);
    }

    .btn-logout {
      background: rgba(239,68,68,0.1);
      color: #fca5a5;
      border: 1px solid rgba(239,68,68,0.2);
      padding: 8px 18px;
      font-size: 13px;
    }

    .btn-logout:hover { background: rgba(239,68,68,0.2); }

    /* Main content */
    .admin-main { padding: 36px 32px; max-width: 1300px; margin: 0 auto; }

    /* Stats */
    .stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      margin-bottom: 32px;
    }

    .stat-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px 24px;
    }

    .stat-label {
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .stat-value {
      font-family: var(--font-d);
      font-size: 32px;
      font-weight: 700;
      line-height: 1;
    }

    .stat-value.blue   { color: var(--accent); }
    .stat-value.green  { color: var(--green); }
    .stat-value.amber  { color: var(--amber); }

    /* Table section */
    .table-section {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 14px;
      overflow: hidden;
    }

    .table-header {
      padding: 20px 24px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .table-title {
      font-family: var(--font-d);
      font-size: 20px;
    }

    .btn-refresh {
      background: rgba(59,130,246,0.1);
      color: var(--accent);
      border: 1px solid rgba(59,130,246,0.2);
      padding: 8px 18px;
      font-size: 13px;
    }

    .btn-refresh:hover { background: rgba(59,130,246,0.2); }

    /* Loading / empty */
    .state-msg {
      text-align: center;
      padding: 60px 24px;
      color: var(--muted);
      font-size: 15px;
    }

    .state-msg span { font-size: 32px; display: block; margin-bottom: 12px; }

    /* Table */
    .table-wrap { overflow-x: auto; }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
    }

    thead tr {
      background: rgba(255,255,255,0.03);
      border-bottom: 1px solid var(--border);
    }

    th {
      padding: 12px 16px;
      text-align: left;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      white-space: nowrap;
    }

    tbody tr {
      border-bottom: 1px solid var(--border);
      transition: background var(--tr);
    }

    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: rgba(255,255,255,0.02); }

    td {
      padding: 14px 16px;
      vertical-align: top;
      color: var(--text);
    }

    .td-name { font-weight: 600; }
    .td-motivation {
      max-width: 220px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      color: var(--muted);
    }

    .td-date { color: var(--muted); white-space: nowrap; font-size: 13px; }

    /* Status badge */
    .status-badge {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 100px;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.05em;
    }

    .status-new      { background: rgba(59,130,246,0.15);  color: #93c5fd; border: 1px solid rgba(59,130,246,0.25); }
    .status-accepted { background: rgba(34,197,94,0.15);   color: #86efac; border: 1px solid rgba(34,197,94,0.25); }
    .status-rejected { background: rgba(239,68,68,0.15);   color: #fca5a5; border: 1px solid rgba(239,68,68,0.25); }

    /* Action buttons */
    .actions { display: flex; gap: 8px; align-items: center; }

    .btn-accept {
      background: rgba(34,197,94,0.1);
      color: #86efac;
      border: 1px solid rgba(34,197,94,0.2);
      padding: 6px 12px;
      font-size: 12px;
      border-radius: 7px;
    }

    .btn-reject {
      background: rgba(245,158,11,0.1);
      color: #fcd34d;
      border: 1px solid rgba(245,158,11,0.2);
      padding: 6px 12px;
      font-size: 12px;
      border-radius: 7px;
    }

    .btn-delete {
      background: rgba(239,68,68,0.1);
      color: #fca5a5;
      border: 1px solid rgba(239,68,68,0.2);
      padding: 6px 12px;
      font-size: 12px;
      border-radius: 7px;
    }

    .btn-accept:hover { background: rgba(34,197,94,0.2); }
    .btn-reject:hover { background: rgba(245,158,11,0.2); }
    .btn-delete:hover { background: rgba(239,68,68,0.2); }

    /* Toast notification */
    .toast {
      position: fixed;
      bottom: 28px;
      right: 28px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 20px;
      font-size: 14px;
      font-weight: 600;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
      transform: translateY(80px);
      opacity: 0;
      transition: all 0.3s cubic-bezier(0.34,1.56,0.64,1);
      z-index: 100;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .toast.show { transform: translateY(0); opacity: 1; }
    .toast.success { border-left: 3px solid var(--green); }
    .toast.error   { border-left: 3px solid var(--red); }

    @media (max-width: 768px) {
      .admin-main { padding: 20px 16px; }
      .stats { grid-template-columns: 1fr; }
      .admin-header { padding: 0 16px; }
      th:nth-child(5), td:nth-child(5) { display: none; } /* скрываем мотивацию */
    }
  </style>
</head>
<body>

  <!-- ── LOGIN SCREEN ── -->
  <div class="login-screen" id="loginScreen">
    <div class="login-box">
      <div class="login-logo">✦ АСДРД</div>
      <h1 class="login-title">Вход в админку</h1>
      <p class="login-sub">Управление заявками школы</p>

      <div class="form-group">
        <label for="loginInput">Логин</label>
        <input type="text" id="loginInput" placeholder="admin" autocomplete="username" />
      </div>
      <div class="form-group">
        <label for="passwordInput">Пароль</label>
        <input type="password" id="passwordInput" placeholder="••••" autocomplete="current-password" />
      </div>

      <button class="btn btn-primary" id="loginBtn" onclick="login()">Войти</button>
      <div class="login-error" id="loginError">Неверный логин или пароль</div>
    </div>
  </div>

  <!-- ── ADMIN PANEL ── -->
  <div class="admin-panel" id="adminPanel">

    <!-- Header -->
    <header class="admin-header">
      <div class="admin-header__left">
        <div class="admin-logo">✦ АСДРД</div>
        <span class="admin-badge">Администратор</span>
      </div>
      <button class="btn btn-logout" onclick="logout()">Выйти</button>
    </header>

    <!-- Main -->
    <main class="admin-main">

      <!-- Статистика -->
      <div class="stats">
        <div class="stat-card">
          <div class="stat-label">Всего заявок</div>
          <div class="stat-value blue" id="statTotal">—</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Принято</div>
          <div class="stat-value green" id="statAccepted">—</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Новых</div>
          <div class="stat-value amber" id="statNew">—</div>
        </div>
      </div>

      <!-- Таблица заявок -->
      <div class="table-section">
        <div class="table-header">
          <div class="table-title">Заявки</div>
          <button class="btn btn-refresh" onclick="loadApplications()">↻ Обновить</button>
        </div>

        <!-- Состояния -->
        <div class="state-msg" id="stateLoading">
          <span>⏳</span>Загружаем заявки...
        </div>
        <div class="state-msg" id="stateEmpty" style="display:none">
          <span>📭</span>Заявок пока нет
        </div>

        <!-- Таблица -->
        <div class="table-wrap" id="tableWrap" style="display:none">
          <table>
            <thead>
              <tr>
                <th>#</th>
                <th>Имя</th>
                <th>Возраст</th>
                <th>Город</th>
                <th>Email</th>
                <th>Мотивация</th>
                <th>Дата</th>
                <th>Статус</th>
                <th>Действия</th>
              </tr>
            </thead>
            <tbody id="applicationsBody"></tbody>
          </table>
        </div>
      </div>

    </main>
  </div>

  <!-- Toast уведомление -->
  <div class="toast" id="toast"></div>

  <script src="admin.js"></script>
</body>
</html>
